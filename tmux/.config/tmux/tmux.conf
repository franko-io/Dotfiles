# Enable mouse support
set -g mouse on

# Set true color
set -g default-terminal 'tmux-256color'
set -sa terminal-overrides ",xterm*:Tc"

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Increase the history limit
set -g history-limit 50000

# Force refresh on pane/window select and focus-in
set -g focus-events on
set-hook -g 'after-select-pane' 'refresh-client -S'
set-hook -g 'after-select-window' 'refresh-client -S'
set-hook -g 'pane-focus-in' 'refresh-client -S'

# Resurrect and Continuum settings
set -g @resurrect-dir '$HOME/.config/tmux/resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '3'

# Change tmux fingers colors
set -g @fingers-highlight-style "fg=magenta"
set -g @fingers-hint-style "fg=blue,bold"

#  Tmux sessionx settings
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~'
set -g @sessionx-filter-current 'false'
set -g @sessionx-preview-ratio '75%'
set -g @sessionx-window-height '85%'
set -g @sessionx-window-width '85%'
set -g @sessionx-layout 'reverse'
set -g @sessionx-bind-select-up 'ctrl-u'
set -g @sessionx-bind-select-down 'ctrl-d'
set -g @sessionx-tmuxinator-mode 'off'
set -g @sessionx-fzf-marks-mode 'off'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'omerxx/tmux-sessionx'

source-file $HOME/.config/tmux/binds.conf
source-file $HOME/.config/tmux/looks.conf

run '$HOME/.config/tmux/plugins/tpm/tpm'

# Set highlight color
set -g mode-style 'fg=#{@thm_pink}, bg=#{@thm_surface_0}'
